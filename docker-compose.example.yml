# Example full-stack deployment.
# Copy to docker-compose.yml and replace all "change-me" values before use.
services:
  app:
    image: ghcr.io/derfloDev/endgame-grocery:latest
    # Used only when building the app image locally. When you pull the published
    # image, this build section does not change the baked frontend threshold.
    build:
      context: .
      args:
        VITE_ICON_SIMILARITY_THRESHOLD: 0.5
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgres://postgres:change-me@postgres:5432/endgame_grocery
      JWT_SECRET: change-me-strong-random-value
      PORT: 4000
      JWT_EXPIRES_IN: 7d
      SMTP_HOST: smtp.change-me.example
      SMTP_PORT: 587
      SMTP_USER: change-me
      SMTP_PASS: change-me
      SMTP_FROM: noreply@change-me.example
      SMTP_FROM_NAME: Endgame Grocery
      APP_BASE_URL: https://grocery.change-me.example
      # Log verbosity: trace | debug | info | warn | error | fatal (default: info)
      LOG_LEVEL: info
      VAPID_PUBLIC_KEY: change-me
      VAPID_PRIVATE_KEY: change-me
      VAPID_CONTACT: mailto:notifications@change-me.example
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: endgame_grocery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
