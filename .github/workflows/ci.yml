name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-lint-and-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  unit-test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-unit-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    needs: [lint-and-build, unit-test]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-e2e-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: endgame_grocery
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Create environment file
        run: |
          printf 'DATABASE_URL=postgres://postgres:postgres@localhost:5432/endgame_grocery\nJWT_SECRET=ci-test-secret\nPORT=4000\n' > .env
      - name: Run database migrations
        run: npm run migrate
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npm run e2e
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
